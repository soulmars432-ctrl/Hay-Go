<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="map.js"></script>
    <title>Document</title>
  </head>
  <body>
    <div
      class="absolute left-3 top-20 z-1001 px-10 py-14 bg-white rounded shadow w-80 opacity-95"
    >
      <label
        class="shadow appearance-none border rounded py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline block"
      >
        Start location (lat,lng)
        <input id="start-input" placeholder="51.505,5.45" />
      </label>
      <label
        class="shadow appearance-none border rounded py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline block mt-4"
      >
        End location (lat,lng)
        <input id="end-input" placeholder="51.515,5.46" />
      </label>
      <button
        id="set-route"
        class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 border border-blue-500 rounded shadow mt-4"
      >
        Set start/end
      </button>
      <small class="text-gray-500 text-sm block mt-2">
        Defaults are current location and the last clicked marker.
      </small>
      <div class="mt-3 text-gray-500 text-sm" id="route-info">
        Route length will appear after the route is loaded.
      </div>
    </div>

    <div id="map" class="h-screen"></div>
  </body>
</html>
